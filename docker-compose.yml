services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./skills:/app/skills:ro
      - ./spec:/app/spec:ro
      - ./agentbench:/app/agentbench
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
